---
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  formula-audit:
    name: Formula audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Audit all formulae
        run: brew audit --strict cncf-maintainers

  e2e-macos:
    name: E2E test (macOS)
    runs-on: macos-latest
    needs: formula-audit

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Install formula from tap
        run: brew install cncf-maintainers

      - name: Verify binary version
        run: |
          EXPECTED=$(grep -E '^\s*version\s+"' Formula/cncf-maintainers.rb | sed -E 's/.*"(.*)".*/\1/')
          cncf-maintainers --version | grep -q "$EXPECTED"

      - name: Run brew test
        run: brew test cncf-maintainers

      - name: Cleanup
        if: always()
        run: brew uninstall cncf-maintainers || true

  e2e-linux:
    name: E2E test (Linux)
    runs-on: ubuntu-latest
    needs: formula-audit

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Install formula from tap
        run: brew install cncf-maintainers

      - name: Verify binary version
        run: |
          EXPECTED=$(grep -E '^\s*version\s+"' Formula/cncf-maintainers.rb | sed -E 's/.*"(.*)".*/\1/')
          cncf-maintainers --version | grep -q "$EXPECTED"

      - name: Run brew test
        run: brew test cncf-maintainers

      - name: Cleanup
        if: always()
        run: brew uninstall cncf-maintainers || true
