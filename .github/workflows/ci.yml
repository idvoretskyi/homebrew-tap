---
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  formula-audit:
    name: Formula audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Audit all formulae
        run: brew audit --strict Formula/*.rb

  e2e-macos:
    name: E2E test (macOS)
    runs-on: macos-latest
    needs: formula-audit

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install formula from local file
        run: brew install --formula Formula/cncf-maintainers.rb

      - name: Verify binary version
        run: cncf-maintainers --version | grep -q "0.1.0"

      - name: Run brew test
        run: brew test cncf-maintainers

      - name: Cleanup
        if: always()
        run: brew uninstall cncf-maintainers || true

  e2e-linux:
    name: E2E test (Linux)
    runs-on: ubuntu-latest
    needs: formula-audit

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Install formula from local file
        run: brew install --formula Formula/cncf-maintainers.rb

      - name: Verify binary version
        run: cncf-maintainers --version | grep -q "0.1.0"

      - name: Run brew test
        run: brew test cncf-maintainers

      - name: Cleanup
        if: always()
        run: brew uninstall cncf-maintainers || true
