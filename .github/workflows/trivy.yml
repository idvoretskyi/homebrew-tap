---
name: trivy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 08:30 UTC (staggered from CodeQL)
    - cron: "30 8 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      # ── Filesystem / config scan ───────────────────────────────────────────
      - name: Run Trivy (filesystem – SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"   # don't fail the job; let the SARIF upload surface results

      - name: Upload Trivy filesystem SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4.35.3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      # ── Table output for easy PR reading ───────────────────────────────────
      - name: Run Trivy (filesystem – table)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"   # fail the job if CRITICAL or HIGH vulns are found
