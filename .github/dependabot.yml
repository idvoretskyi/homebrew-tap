---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels: [dependencies, github-actions]
    commit-message:
      prefix: "chore(actions)"
    groups:
      actions:
        patterns: ["*"]
