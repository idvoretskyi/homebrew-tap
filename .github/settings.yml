---
# Repository settings managed by probot/settings
# https://github.com/repository-settings/app

repository:
  name: homebrew-tap
  description: >-
    Homebrew tap for custom formulae by @idvoretskyi
  homepage: https://github.com/idvoretskyi/homebrew-tap
  topics:
    - homebrew
    - homebrew-tap
    - homebrew-formula
    - macos
    - cli

  private: false
  has_issues: true
  has_projects: false
  has_wiki: false
  has_downloads: true

  default_branch: main
  delete_branch_on_merge: true

  allow_squash_merge: true
  allow_merge_commit: true
  allow_rebase_merge: true
  allow_auto_merge: false

labels:
  # --- Standard issue triage ---
  - name: bug
    color: '#d73a4a'
    description: Something isn't working

  - name: enhancement
    color: '#a2eeef'
    description: New feature or request

  - name: documentation
    color: '#0075ca'
    description: Improvements or additions to documentation

  - name: question
    color: '#d876e3'
    description: Further information is requested

  - name: duplicate
    color: '#cfd3d7'
    description: This issue or pull request already exists

  - name: invalid
    color: '#e4e669'
    description: This doesn't seem right

  - name: wontfix
    color: '#ffffff'
    description: This will not be worked on

  - name: good first issue
    color: '#7057ff'
    description: Good for newcomers

  - name: help wanted
    color: '#008672'
    description: Extra attention is needed

  # --- Development ---
  - name: formula
    color: '#fbca04'
    description: Homebrew formula changes

  - name: security
    color: '#ee0701'
    description: Security related changes or fixes

  # --- Dependabot: github-actions ecosystem ---
  - name: ci/cd
    color: '#6f42c1'
    description: CI/CD pipeline changes

  - name: github-actions
    color: '#000000'
    description: Pull requests that update GitHub Actions code
